<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./media/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="style/style.css" as="style" />
    <link rel="stylesheet" href="style/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="preload" href="javascript/games-list.json" as="fetch" />

    <title>DeathB4t - Beated Games</title>
    <meta
      name="description"
      content="Discover Beated Games, a curated collection of video games I've completed. Explore game summaries, reviews, and my personal gaming journey."
    />
  </head>

  <body>
    <svg
      class="platinum-svg-defs"
      width="0"
      height="0"
      aria-hidden="true"
      focusable="false"
    >
      <defs>
        <filter
          id="turbulent-displace"
          color-interpolation-filters="sRGB"
          x="-20%"
          y="-20%"
          width="140%"
          height="140%"
        >
          <feTurbulence
            type="turbulence"
            baseFrequency="0.02"
            numOctaves="10"
            result="noise1"
            seed="1"
          />
          <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
            <animate
              attributeName="dy"
              values="700; 0"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feTurbulence
            type="turbulence"
            baseFrequency="0.02"
            numOctaves="10"
            result="noise2"
            seed="1"
          />
          <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
            <animate
              attributeName="dy"
              values="0; -700"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feTurbulence
            type="turbulence"
            baseFrequency="0.02"
            numOctaves="10"
            result="noise3"
            seed="2"
          />
          <feOffset in="noise3" dx="0" dy="0" result="offsetNoise3">
            <animate
              attributeName="dx"
              values="490; 0"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feTurbulence
            type="turbulence"
            baseFrequency="0.02"
            numOctaves="10"
            result="noise4"
            seed="2"
          />
          <feOffset in="noise4" dx="0" dy="0" result="offsetNoise4">
            <animate
              attributeName="dx"
              values="0; -490"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feComposite in="offsetNoise1" in2="offsetNoise2" result="part1" />
          <feComposite in="offsetNoise3" in2="offsetNoise4" result="part2" />
          <feBlend
            in="part1"
            in2="part2"
            mode="color-dodge"
            result="combinedNoise"
          />
          <feDisplacementMap
            in="SourceGraphic"
            in2="combinedNoise"
            scale="18"
            xChannelSelector="R"
            yChannelSelector="B"
          />
        </filter>
        <filter
          id="turbulent-displace-card"
          color-interpolation-filters="sRGB"
          x="-50%"
          y="-50%"
          width="200%"
          height="200%"
        >
          <feTurbulence
            type="turbulence"
            baseFrequency="0.03"
            numOctaves="8"
            result="noise1"
            seed="1"
          />
          <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
            <animate
              attributeName="dy"
              values="90; 35; 90"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feTurbulence
            type="turbulence"
            baseFrequency="0.03"
            numOctaves="8"
            result="noise2"
            seed="1"
          />
          <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
            <animate
              attributeName="dy"
              values="35; 90; 35"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feTurbulence
            type="turbulence"
            baseFrequency="0.03"
            numOctaves="8"
            result="noise3"
            seed="2"
          />
          <feOffset in="noise3" dx="0" dy="0" result="offsetNoise3">
            <animate
              attributeName="dx"
              values="70; 28; 70"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feTurbulence
            type="turbulence"
            baseFrequency="0.03"
            numOctaves="8"
            result="noise4"
            seed="2"
          />
          <feOffset in="noise4" dx="0" dy="0" result="offsetNoise4">
            <animate
              attributeName="dx"
              values="28; 70; 28"
              dur="6s"
              repeatCount="indefinite"
              calcMode="linear"
            />
          </feOffset>
          <feComposite in="offsetNoise1" in2="offsetNoise2" result="part1" />
          <feComposite in="offsetNoise3" in2="offsetNoise4" result="part2" />
          <feBlend
            in="part1"
            in2="part2"
            mode="color-dodge"
            result="combinedNoise"
          />
          <feDisplacementMap
            in="SourceGraphic"
            in2="combinedNoise"
            scale="16"
            xChannelSelector="R"
            yChannelSelector="B"
          />
        </filter>
      </defs>
    </svg>
    <main>
      <h1 class="page-title">Beated Games</h1>
      <div id="container"></div>
    </main>

    <footer></footer>
    <script type="module" src="javascript/mapCards.js"></script>
  </body>
</html>
